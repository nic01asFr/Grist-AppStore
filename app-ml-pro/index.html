<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0ea5e9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SCOUT ML Pro — Entraînement détection</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="../shared/grist-client.js"></script>
<script src="../shared/storage.js"></script>
<script src="../shared/sensors.js"></script>
<script src="../shared/ml-dataset.js"></script>
<script src="../shared/ml-models.js"></script>
<script src="../shared/ml-inference.js"></script>
<style>
:root{--app:#0ea5e9;--app-bg:rgba(14,165,233,.12);--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.18);--tx:#e6edf3;--tx2:#8b949e;--tx3:#484f58;--cg:#3fb950;--cr:#f85149;--ca:#d29922;--r:8px;--r2:12px;--f:'Segoe UI',system-ui,sans-serif;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--tx);font-size:14px;overflow:hidden;height:100dvh;display:flex;flex-direction:column}
.tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg2)}
.tab{flex:1;padding:12px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;-webkit-tap-highlight-color:transparent}
.tab.on{color:var(--app);border-bottom-color:var(--app)}
.screen{display:none;flex:1;overflow-y:auto;flex-direction:column}
.screen.on{display:flex}

/* Camera + annotation */
#camWrap{position:relative;width:100%;aspect-ratio:4/3;background:#000;flex-shrink:0}
#cam{width:100%;height:100%;object-fit:cover}
#annCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair}
.ann-toolbar{display:flex;gap:6px;padding:8px 12px;align-items:center;border-bottom:1px solid var(--bd);flex-shrink:0;overflow-x:auto}
.ann-class{padding:6px 12px;border-radius:16px;border:1.5px solid var(--bd2);background:var(--bg2);color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.ann-class.on{border-color:var(--app);color:var(--app);background:var(--app-bg)}
.ann-class-add{border-style:dashed;color:var(--tx3)}

/* Dataset panel */
.ds-section{padding:16px}
.ds-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.ds-stat{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:10px;text-align:center}
.ds-stat-v{font-size:22px;font-weight:700}
.ds-stat-l{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.ds-class-list{display:flex;flex-direction:column;gap:6px}
.ds-class{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px}
.ds-class-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ds-class-name{flex:1;font-weight:600;font-size:13px}
.ds-class-count{font-size:13px;font-weight:700}
.ds-class-bar{flex:2;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.ds-class-fill{height:100%;background:var(--app);border-radius:2px}
.ds-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.ds-btn{padding:10px 16px;border-radius:var(--r);border:1.5px solid var(--bd2);background:transparent;color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f)}
.ds-btn:active{background:var(--bg3)}
.ds-btn-primary{background:var(--app);color:#fff;border-color:transparent}

/* Models panel */
.model-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:10px}
.model-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.model-name{font-weight:700;font-size:14px;flex:1}
.model-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.model-badge.active{background:var(--cg);color:#fff}
.model-badge.local{background:var(--app-bg);color:var(--app)}
.model-meta{display:flex;gap:12px;font-size:11px;color:var(--tx3);flex-wrap:wrap}
.model-actions{display:flex;gap:6px;margin-top:10px}
.model-btn{padding:6px 12px;border-radius:var(--r);border:1px solid var(--bd2);background:transparent;color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--f)}
.model-btn:active{background:var(--bg3)}
.model-btn-activate{border-color:var(--cg);color:var(--cg)}

/* Import section */
.import-section{padding:16px}
.import-field{margin-bottom:12px}
.import-field label{font-size:12px;font-weight:600;color:var(--tx2);display:block;margin-bottom:4px}
.import-field input{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:10px 12px;font-size:14px;color:var(--tx);outline:none;font-family:var(--f)}
.import-field input:focus{border-color:var(--app)}

#toast{position:fixed;bottom:calc(60px + var(--sb));left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r2);padding:10px 20px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:all .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="tabs">
  <div class="tab on" onclick="switchTab('capture')">📷 Capturer</div>
  <div class="tab" onclick="switchTab('dataset')">📊 Dataset</div>
  <div class="tab" onclick="switchTab('models')">🧠 Modèles</div>
</div>

<!-- Capture + Annotation -->
<div class="screen on" id="screen-capture">
  <div id="camWrap">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="annCanvas"></canvas>
  </div>
  <div class="ann-toolbar" id="annToolbar"></div>
  <div style="padding:12px;text-align:center;color:var(--tx3);font-size:12px">
    Dessiner un rectangle sur l'image pour annoter. Appuyer sans dessiner = capture image entière.
  </div>
</div>

<!-- Dataset Stats -->
<div class="screen" id="screen-dataset">
  <div class="ds-section">
    <div class="ds-stats" id="dsStats"></div>
    <div class="ds-class-list" id="dsClasses"></div>
    <div class="ds-actions">
      <button class="ds-btn ds-btn-primary" onclick="exportCOCO()">📦 Export COCO JSON</button>
      <button class="ds-btn" onclick="clearDataset()">🗑 Vider le dataset</button>
      <button class="ds-btn" onclick="syncToGrist()">🔄 Sync → Grist</button>
    </div>
  </div>
</div>

<!-- Models -->
<div class="screen" id="screen-models">
  <div class="ds-section">
    <div id="modelList"></div>
    <div style="margin-top:16px">
      <div style="font-size:12px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Charger un modèle</div>
      <div class="import-field">
        <label>Modèle pré-configuré</label>
        <select id="presetModel" style="width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:10px 12px;font-size:14px;color:var(--tx);font-family:var(--f)">
          <option value="">— Choisir un modèle —</option>
          <option value="efdet0|https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite|mediapipe">EfficientDet-Lite0 (3.2 Mo, 80 classes, rapide)</option>
          <option value="efdet2|https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite2/float16/1/efficientdet_lite2.tflite|mediapipe">EfficientDet-Lite2 (5.3 Mo, 80 classes, plus précis)</option>
          <option value="cocossd|https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3|tfjs-cocossd">COCO-SSD MobileNet (1.8 Mo, 80 classes, léger)</option>
        </select>
      </div>
      <button class="ds-btn ds-btn-primary" onclick="loadPresetModel()" style="margin-top:8px">⬇ Charger le modèle</button>

      <div style="font-size:12px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 12px">Ou importer un modèle custom</div>
      <div class="import-field">
        <label>URL du modèle (.tflite ou model.json)</label>
        <input id="importUrl" type="url" placeholder="https://storage.../custom_model.tflite">
      </div>
      <div class="import-field">
        <label>Nom</label>
        <input id="importName" type="text" placeholder="fissures-v1">
      </div>
      <button class="ds-btn" onclick="importModel()">⬇ Importer custom</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══ STATE ══
const dataset = new MLDataset({ dbName: 'ml-dataset-pro' });
const modelMgr = new MLModelManager();
const store = new AppStorage('scout_ml_pro_v1');

let classes = [];
let activeClass = null;
let drawing = false;
let startX = 0, startY = 0;
let currentBoxes = [];

// ══ INIT ══
async function init() {
  const saved = await store.load();
  if (saved?.classes) classes = saved.classes;
  if (!classes.length) classes = ['Classe 1', 'Classe 2'];

  activeClass = classes[0] || null;
  renderToolbar();
  await startCamera();
  setupAnnotation();
  updateDatasetView();
  renderModels();
}

// ══ CAMERA ══
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    const v = document.getElementById('cam');
    v.srcObject = stream;
    await new Promise(r => { v.onloadedmetadata = () => { v.play(); r(); }; });
  } catch(e) { toast('Caméra inaccessible'); }
}

// ══ ANNOTATION ══
function setupAnnotation() {
  const canvas = document.getElementById('annCanvas');
  const video = document.getElementById('cam');

  function syncSize() {
    canvas.width = video.videoWidth || video.clientWidth;
    canvas.height = video.videoHeight || video.clientHeight;
  }
  video.addEventListener('loadedmetadata', syncSize);
  syncSize();

  let rect = null;
  canvas.addEventListener('pointerdown', e => {
    if (!activeClass) { toast('Sélectionnez une classe'); return; }
    const r = canvas.getBoundingClientRect();
    startX = (e.clientX - r.left) * (canvas.width / r.width);
    startY = (e.clientY - r.top) * (canvas.height / r.height);
    drawing = true;
    rect = { x: startX, y: startY, w: 0, h: 0 };
  });

  canvas.addEventListener('pointermove', e => {
    if (!drawing || !rect) return;
    const r = canvas.getBoundingClientRect();
    const cx = (e.clientX - r.left) * (canvas.width / r.width);
    const cy = (e.clientY - r.top) * (canvas.height / r.height);
    rect.w = cx - startX;
    rect.h = cy - startY;
    drawBoxes([...currentBoxes, { ...rect, label: activeClass }]);
  });

  canvas.addEventListener('pointerup', async e => {
    if (!drawing) return;
    drawing = false;
    if (!rect || (Math.abs(rect.w) < 10 && Math.abs(rect.h) < 10)) {
      // Tap simple = capturer image entière
      await captureFullImage();
    } else {
      // Normaliser bbox (w/h positifs)
      const box = {
        x: rect.w < 0 ? rect.x + rect.w : rect.x,
        y: rect.h < 0 ? rect.y + rect.h : rect.y,
        w: Math.abs(rect.w),
        h: Math.abs(rect.h),
        label: activeClass
      };
      currentBoxes.push(box);
      drawBoxes(currentBoxes);
      toast(`bbox ${activeClass} ajoutée (${currentBoxes.length})`);
    }
    rect = null;
  });
}

function drawBoxes(boxes) {
  const canvas = document.getElementById('annCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const colors = ['#0ea5e9','#3fb950','#d29922','#f85149','#bc8cff','#ff7b72'];
  boxes.forEach((box, i) => {
    const color = colors[classes.indexOf(box.label) % colors.length] || '#58a6ff';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.strokeRect(box.x, box.y, box.w, box.h);
    ctx.fillStyle = color;
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText(box.label, box.x + 4, box.y > 16 ? box.y - 4 : box.y + 14);
  });
}

async function captureFullImage() {
  if (!activeClass) { toast('Sélectionnez une classe d\'abord'); return; }
  const video = document.getElementById('cam');
  if (video.readyState < 2) { toast('Caméra pas encore prête'); return; }
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));

  const boxes = currentBoxes.length ? [...currentBoxes] : null;
  await dataset.capture(blob, activeClass, { bbox: boxes, source: 'pro' });
  currentBoxes = [];
  drawBoxes([]);
  toast(`Capturé ${boxes ? boxes.length + ' bbox' : 'image entière'}`);
  updateDatasetView();
}

// ══ TOOLBAR ══
function renderToolbar() {
  const tb = document.getElementById('annToolbar');
  tb.innerHTML = classes.map(c =>
    `<button class="ann-class ${c === activeClass ? 'on' : ''}" onclick="selectClass('${c}')">${c}</button>`
  ).join('') + `<button class="ann-class ann-class-add" onclick="addClass()">+</button>
   <button class="ann-class" onclick="captureFullImage()" style="margin-left:auto;border-color:var(--cg);color:var(--cg)">📷 Capturer</button>`;
}
function selectClass(name) {
  activeClass = name;
  renderToolbar();
}
function addClass() {
  const name = prompt('Nom de la classe :');
  if (!name?.trim()) return;
  classes.push(name.trim());
  store.save({ classes });
  renderToolbar();
}

// ══ DATASET ══
async function updateDatasetView() {
  const stats = await dataset.getClassStats();
  const total = Object.values(stats).reduce((n, s) => n + s.total, 0);
  const withBbox = Object.values(stats).reduce((n, s) => n + s.withBbox, 0);
  const maxCount = Math.max(...Object.values(stats).map(s => s.total), 1);

  document.getElementById('dsStats').innerHTML = `
    <div class="ds-stat"><div class="ds-stat-v">${total}</div><div class="ds-stat-l">Images</div></div>
    <div class="ds-stat"><div class="ds-stat-v">${withBbox}</div><div class="ds-stat-l">Annotées bbox</div></div>
    <div class="ds-stat"><div class="ds-stat-v">${classes.length}</div><div class="ds-stat-l">Classes</div></div>`;

  const colors = ['#0ea5e9','#3fb950','#d29922','#f85149','#bc8cff','#ff7b72'];
  document.getElementById('dsClasses').innerHTML = classes.map((c, i) => {
    const n = stats[c]?.total || 0;
    const pct = (n / maxCount) * 100;
    return `<div class="ds-class">
      <span class="ds-class-dot" style="background:${colors[i % colors.length]}"></span>
      <span class="ds-class-name">${c}</span>
      <div class="ds-class-bar"><div class="ds-class-fill" style="width:${pct}%"></div></div>
      <span class="ds-class-count">${n}</span>
    </div>`;
  }).join('');
}

async function exportCOCO() {
  toast('Export COCO JSON…');
  const coco = await dataset.exportCOCO();
  const json = JSON.stringify({ images: coco.images, annotations: coco.annotations, categories: coco.categories }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'dataset_coco.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Export terminé — ' + coco.images.length + ' images');
}

async function clearDataset() {
  if (!confirm('Vider tout le dataset local ?')) return;
  await dataset.clear();
  updateDatasetView();
  toast('Dataset vidé');
}

async function syncToGrist() {
  toast('Sync Grist non implémenté (à venir)');
}

// ══ MODELS ══
function renderModels() {
  const loaded = modelMgr.listLoaded();
  const container = document.getElementById('modelList');
  if (!loaded.length) {
    container.innerHTML = '<div style="text-align:center;color:var(--tx3);padding:20px;font-size:13px">Aucun modèle chargé.<br>Importez un .tflite ou model.json ci-dessous.</div>';
    return;
  }
  container.innerHTML = loaded.map(m => `
    <div class="model-card">
      <div class="model-hdr">
        <span class="model-name">${m.name}</span>
        ${m.active ? '<span class="model-badge active">Actif</span>' : ''}
        <span class="model-badge local">${m.type}</span>
      </div>
      <div class="model-meta">
        <span>Source: ${m.source.substring(0, 40)}…</span>
        ${m.accuracy != null ? `<span>Accuracy: ${(m.accuracy * 100).toFixed(0)}%</span>` : ''}
      </div>
      <div class="model-actions">
        ${!m.active ? `<button class="model-btn model-btn-activate" onclick="activateModel('${m.name}')">Activer</button>` : ''}
        <button class="model-btn" onclick="unloadModel('${m.name}')">Décharger</button>
      </div>
    </div>`).join('');
}

async function loadPresetModel() {
  const sel = document.getElementById('presetModel').value;
  if (!sel) { toast('Choisissez un modèle'); return; }
  const [name, url, type] = sel.split('|');
  toast('Chargement ' + name + '…');
  try {
    if (type === 'mediapipe') {
      await modelMgr.loadMediaPipe(name, url);
    } else if (type === 'tfjs-cocossd') {
      const cocoSsd = await import('https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/+esm');
      const model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
      modelMgr.models[name] = { model, type: 'coco-ssd', source: url, loadedAt: Date.now() };
    } else {
      await modelMgr.loadTFJS(name, url);
    }
    modelMgr.activate(name);
    renderModels();
    toast(name + ' chargé et activé');
  } catch(e) { toast('Erreur : ' + e.message); }
}

async function importModel() {
  const url = document.getElementById('importUrl').value.trim();
  const name = document.getElementById('importName').value.trim() || 'custom-' + Date.now();
  if (!url) { toast('Entrez une URL'); return; }
  toast('Chargement du modèle…');
  try {
    if (url.endsWith('.tflite')) {
      await modelMgr.loadMediaPipe(name, url);
    } else {
      await modelMgr.loadTFJS(name, url);
    }
    modelMgr.activate(name);
    renderModels();
    toast(`Modèle "${name}" chargé et activé`);
  } catch(e) { toast('Erreur : ' + e.message); }
}

function activateModel(name) { modelMgr.activate(name); renderModels(); toast(`${name} activé`); }
function unloadModel(name) { modelMgr.unload(name); renderModels(); }

// ══ TABS ══
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('on');
  document.getElementById('screen-' + name).classList.add('on');
  if (name === 'dataset') updateDatasetView();
  if (name === 'models') renderModels();
}

// ══ TOAST ══
let toastTimer;
function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2500); }

init();
</script>
</body>
</html>
