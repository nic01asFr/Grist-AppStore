name: Build APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli@6
          npm install @capacitor/core@6 @capacitor/android@6 @capacitor/preferences@6

      - name: Init & sync Capacitor
        run: |
          npx cap init "SCOUT IA" "fr.cerema.scoutia" --web-dir app 2>/dev/null || true
          npx cap add android 2>/dev/null || true
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scout-ia-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: SCOUT IA ${{ github.ref_name }}
          body: |
            ## Installation Android

            1. Télécharger `app-debug.apk`
            2. Paramètres → Sécurité → Sources inconnues
            3. Ouvrir et installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
