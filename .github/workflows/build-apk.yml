name: Build APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli@6
          npm install @capacitor/core@6 @capacitor/android@6 @capacitor/preferences@6

      - name: Init & sync Capacitor
        run: |
          npx cap init "SCOUT IA" "fr.cerema.scoutia" --web-dir app 2>/dev/null || true
          npx cap add android 2>/dev/null || true
          npx cap sync android

      - name: Patch AndroidManifest — RECORD_AUDIO + INTERNET
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "RECORD_AUDIO" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />|' "$MANIFEST"
          fi
          if ! grep -q "RECORD_AUDIO" "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n</manifest>|' "$MANIFEST"
          fi
          grep "uses-permission" "$MANIFEST"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scout-ia-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: SCOUT IA ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
